version: '3.9'

services:

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/eventflow
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"